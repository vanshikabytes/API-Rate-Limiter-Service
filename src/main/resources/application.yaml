server:
  port: 8080

rate-limiter:
  cleanupTtlSeconds: 300
  cleanupIntervalMs: 60000

  limits:
    user:
      minute:
        capacity: 5
        refillRate: 0

    ip:
      minute:
        capacity: 5
        refillRate: 0

    apiKey:
      minute:
        capacity: 5
        refillRate: 0
